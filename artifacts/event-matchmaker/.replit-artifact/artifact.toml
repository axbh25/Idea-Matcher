kind = "web"
previewPath = "/"
title = "Event Matchmaker"
version = "1.0.0"
id = "artifacts/event-matchmaker"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22575

[services.development]
run = "pnpm --filter @workspace/event-matchmaker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/event-matchmaker", "run", "build" ]
serve = "static"
publicDir = "artifacts/event-matchmaker/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22575"
BASE_PATH = "/"
